services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    command: uvicorn orion.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/orion
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=orion
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
