services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    command: uvicorn orion.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/orion
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    volumes:
      - .:/code
    command: python -m orion.worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/orion
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      - postgres
      - redis

  recovery:
    build: .
    volumes:
      - .:/code
    command: python -m orion.recovery
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/orion
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      - postgres
      - redis

  scheduler:
    build: .
    volumes:
      - .:/code
    command: python -m orion.scheduler
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/orion
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=orion
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
